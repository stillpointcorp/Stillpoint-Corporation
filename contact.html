      <h1>Stillpoint</h1>

    <form id="contactform" method="post">
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" autocomplete="given-name"><br />
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" autocomplete="family-name"><br />
        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" autocomplete="email"><br />
        <label for="mobile">Mobile:</label>
        <input type="text" id="mobile" name="mobile" autocomplete="tel"><br /><br />
        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea><br /><br />
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
